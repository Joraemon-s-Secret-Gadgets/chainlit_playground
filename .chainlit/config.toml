[project]
user_env = []
session_timeout = 3600
user_session_timeout = 1296000
cache = false
persist_user_env = false
mask_user_env = false
allow_origins = ["*"]

[features]
unsafe_allow_html = false
latex = false
user_message_markdown = true
user_message_autoscroll = true
assistant_message_autoscroll = true
auto_tag_thread = true
edit_message = true
allow_thread_sharing = false
favorites = false

[features.slack]
reaction_on_message_received = false

[features.spontaneous_file_upload]
enabled = true
accept = ["*/*"]
max_files = 20
max_size_mb = 500

[features.audio]
enabled = false
sample_rate = 24000

[features.mcp]
enabled = false

[features.mcp.sse]
enabled = true

[features.mcp.streamable-http]
enabled = true

[features.mcp.stdio]
enabled = true
allowed_executables = ["npx", "uvx"]

[UI]
name = "Assistant"

# ✅ 핵심 1: 사이드바 강제 활성화
default_sidebar_state = "open"

# ✅ 핵심 2: 설정을 사이드바로 이동
chat_settings_location = "sidebar"

# ✅ 핵심 3: 사이드바 열렸을 때 설정도 자동 오픈
default_chat_settings_open = true

confirm_new_chat = true
cot = "full"
alert_style = "classic"

logo_file_url = ""
default_avatar_file_url = ""

[meta]
generated_by = "2.10.1"
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>JobPocket - 회원가입</title>
    <style>
        body { font-family: sans-serif; background-color: #0F172A; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background-color: #1E293B; padding: 40px; border-radius: 10px; width: 300px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #334155; background: #0F172A; color: white; }
        button { width: 100%; padding: 10px; background-color: #3B82F6; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #2563EB; }
        .msg { color: #EF4444; font-size: 0.9em; margin-bottom: 10px; }
        a { color: #60A5FA; text-decoration: none; font-size: 0.9em; display: block; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>JobPocket 가입하기</h2>
        {% if error_msg %}<div class="msg">{{ error_msg }}</div>{% endif %}
        <form action="/signup" method="post">
            <input type="text" name="username" placeholder="아이디" required>
            <input type="email" name="email" placeholder="이메일" required>
            <input type="password" name="password" placeholder="비밀번호" required>
            <button type="submit">가입완료</button>
        </form>
        <a href="/">← 로그인 화면으로 돌아가기</a>
    </div>
</body>
</html>

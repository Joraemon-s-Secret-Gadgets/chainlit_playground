<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>JobPocket - AI 자소서 첨삭</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #F8FAFC; color: #1E293B; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { text-align: center; background: white; padding: 50px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 400px; }
        h1 { color: #2563EB; margin-bottom: 10px; }
        p { color: #64748B; margin-bottom: 30px; line-height: 1.5; }
        .btn { display: block; width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 8px; text-decoration: none; font-weight: bold; transition: all 0.2s; box-sizing: border-box; }
        .btn-login { background-color: #3B82F6; color: white; border: 2px solid #3B82F6; }
        .btn-login:hover { background-color: #2563EB; }
        .btn-signup { background-color: white; color: #3B82F6; border: 2px solid #3B82F6; }
        .btn-signup:hover { background-color: #EFF6FF; }
    </style>
</head>
<body>
    <div class="container">
        <h1>JobPocket</h1>
        <p>당신의 경험을 완벽한 무기로.<br>AI 자소서 첨삭 어시스턴트에 오신 것을 환영합니다.</p>
        
        <a href="/chat" class="btn btn-login">로그인 (첨삭 시작하기)</a>
        
        <a href="/signup" class="btn btn-signup">새 계정 만들기 (회원가입)</a>
    </div>
</body>
</html>
